name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Install npm dependencies
        run: npm ci

      - name: Pack tarball
        run: |
          mkdir -p dist
          cp bin/tokentracker.js dist/tokentracker
          chmod +x dist/tokentracker
          tar -czvf dist/tokentracker.tar.gz -C dist .

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
