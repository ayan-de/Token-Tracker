<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodexBar</title>
    <script type="module" src="./main.js"></script>
  </head>

  <body>
    <div class="app-container">
      <!-- Header -->
      <header>
        <div class="brand">
          <h1>CodexBar</h1>
          <div id="server-status" class="server-badge">
            <span id="status-dot" class="badge-dot"></span>
            <span id="status-text">Connecting...</span>
          </div>
        </div>
        <div class="actions">
          <button id="refresh-btn" class="btn-icon" title="Refresh Usage">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Content Area -->
      <div id="main-content">
        <!-- Error Banner -->
        <div id="error-banner" class="error-banner"></div>

        <!-- Loader -->
        <div id="loader" class="loader-container">
          <div class="spinner"></div>
          <p>Syncing AI quotas...</p>
        </div>

        <!-- Providers List -->
        <div id="providers-container" style="display: none;">
          <div class="section-title">
            <span>Enabled Providers</span>
          </div>
          <div id="providers-list" class="providers-list">
            <!-- Dynamic provider cards injected here -->
          </div>
        </div>

        <!-- Cost Card -->
        <div id="cost-container" style="display: none;">
          <div class="section-title">
            <span>Cost & Spend (30d)</span>
          </div>
          <div id="cost-card" class="cost-card">
            <!-- Dynamic cost summary injected here -->
          </div>
        </div>
      </div>

      <!-- Console / CLI Command Runner -->
      <div class="console-section">
        <div class="section-title">
          <span>CodexBar CLI Terminal</span>
        </div>
        <div class="console-input-wrapper">
          <span class="console-prefix">codexbar</span>
          <input type="text" id="console-input" class="console-input" placeholder="config enable --provider claude..." />
        </div>
        <div id="console-output" class="console-output"></div>
      </div>

      <!-- CLI Installer Screen Overlay -->
      <div id="install-overlay" class="install-overlay" style="display: none;">
        <div class="install-card">
          <div class="install-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
          </div>
          <div class="install-title">CodexBar CLI Not Found</div>
          <div class="install-desc">
            The CodexBar CLI is required to retrieve active provider quotas and costs from your local system.
          </div>
          <div class="install-actions">
            <button id="install-cli-btn" class="btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              Install CodexBar CLI
            </button>
          </div>
          <!-- Progress Info -->
          <div id="install-progress-container" class="install-progress-container">
            <div id="install-progress-text" class="install-progress-text">Initializing...</div>
            <div class="install-progress-bar">
              <div id="install-progress-fill" class="install-progress-fill installing"></div>
            </div>
            <div id="install-log" class="install-log"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
